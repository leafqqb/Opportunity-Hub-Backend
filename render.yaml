databases:
  - name: opportunityhub-db
    plan: free

services:
  - type: web
    name: opportunityhub-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn hub.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opportunityhub-db
          property: connectionString